name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14"]
        backend: [numpy, numba, jax, torch]
        include:
          # Coverage leg: full suite, all backends, one Python/OS. Folded in
          # from the former standalone `coverage:` job (spec A8).
          - os: ubuntu-latest
            python-version: "3.13"
            backend: all

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install the project
        run: |
          if [ "${{ matrix.backend }}" = "all" ]; then
            uv sync --all-extras --dev
          elif [ "${{ matrix.backend }}" = "numpy" ]; then
            uv sync
          else
            uv sync --extra ${{ matrix.backend }}
          fi

      - name: Run tests
        if: matrix.backend != 'all'
        run: uv run pytest tests/ --backend ${{ matrix.backend }}

      - name: Run tests with coverage
        if: matrix.backend == 'all'
        run: |
          uv run pytest --cov=scoringrules tests/
          uv run coverage xml

      - name: Upload coverage report to Codecov
        if: matrix.backend == 'all'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"

      - name: Run pre-commit hooks
        run: uvx pre-commit run --all-files
